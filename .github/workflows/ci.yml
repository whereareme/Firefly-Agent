name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-tests:
    name: Python tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra channels --extra firefly

      - name: Run test suite
        run: uv run pytest -q --cov=src/openharness --cov=ohmo --cov=firefly --cov-report=term --cov-fail-under=60

  python-quality:
    name: Python quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra channels --extra firefly

      - name: Ruff
        run: uv run ruff check src tests scripts ohmo firefly

      - name: Mypy baseline
        run: uv run mypy

  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/terminal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/terminal/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

  autopilot-dashboard-build:
    name: Autopilot dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autopilot-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: autopilot-dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build
