<!doctype html>

  <head>

    <title>Firefly Agent Live2D</title>
    <style>
      html,
      body,
      #stage,
      canvas {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;

      }

      body {
        font-family: "Microsoft YaHei", sans-serif;
      }

      #status {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: 12px;
        padding: 8px 10px;

        border-radius: 6px;
        background: rgba(255, 255, 255, 0.84);
        color: #0f676c;
        font-size: 12px;
        line-height: 1.5;
      }

      #status:empty {
        display: none;
      }
    </style>
    <script defer src="/vendor/pixi.min.js"></script>
    <script defer src="/assets/live2d/Core/live2dcubismcore.min.js"></script>

    <script defer src="/live2d_renderer.js"></script>
  </head>

    <div id="stage">
      <canvas id="firefly-live2d"></canvas>
      <div id="status">Live2D 加载中...</div>
    </div>
